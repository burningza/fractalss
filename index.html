<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <canvas id="fractal-canvas"></canvas>

        <div id="info-panel" class="panel">
            <h2 id="fractal-name">Fractal Explorer</h2>
            <div id="math-info">
                <p>Select a fractal to see mathematical information.</p>
            </div>
        </div>

        <div id="controls-panel" class="panel">
            <h3>Parameters</h3>

            <div class="control-group">
                <label for="fractal-type">Fractal Type:</label>
                <select id="fractal-type">
                    <option value="mandelbulb">Mandelbulb</option>
                    <option value="julia">Julia Set</option>
                    <option value="menger">Menger Sponge</option>
                    <option value="sierpinski">Sierpinski Tetrahedron</option>
                    <option value="pickover">Pickover Attractor</option>
                    <option value="dejong">Peter de Jong Attractor</option>
                    <option value="tinkerbell">Tinkerbell Attractor</option>
                    <option value="lorenz">Lorenz Attractor</option>
                </select>
            </div>

            <div class="control-group">
                <label for="iterations">Iterations: <span id="iter-val">8</span></label>
                <input type="range" id="iterations" min="3" max="15" value="8">
            </div>

            <div class="control-group">
                <label for="zoom">Zoom: <span id="zoom-val">2.0</span></label>
                <input type="range" id="zoom" min="0.5" max="5" step="0.1" value="2.0">
            </div>

            <div class="control-group">
                <label for="color-scheme">Color Scheme:</label>
                <select id="color-scheme">
                    <option value="classic">Classic</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="neon">Neon</option>
                </select>
            </div>

            <div class="control-group julia-controls" style="display: none;">
                <label for="julia-x">Julia X: <span id="julia-x-val">0.3</span></label>
                <input type="range" id="julia-x" min="-1" max="1" step="0.01" value="0.3">

                <label for="julia-y">Julia Y: <span id="julia-y-val">0.5</span></label>
                <input type="range" id="julia-y" min="-1" max="1" step="0.01" value="0.5">
            </div>

            <div class="control-group attractor-abcd-controls" style="display: none;">
                <label for="attractor-a">Input A: <span id="attractor-a-val">1.0</span></label>
                <input type="range" id="attractor-a" min="-3" max="3" step="0.01" value="1.0">

                <label for="attractor-b">Input B: <span id="attractor-b-val">1.8</span></label>
                <input type="range" id="attractor-b" min="-3" max="3" step="0.01" value="1.8">

                <label for="attractor-c">Input C: <span id="attractor-c-val">0.7</span></label>
                <input type="range" id="attractor-c" min="-3" max="3" step="0.01" value="0.7">

                <label for="attractor-d">Input D: <span id="attractor-d-val">1.2</span></label>
                <input type="range" id="attractor-d" min="-3" max="3" step="0.01" value="1.2">
            </div>

            <div class="control-group lorenz-controls" style="display: none;">
                <label for="lorenz-sigma">Sigma: <span id="lorenz-sigma-val">10.0</span></label>
                <input type="range" id="lorenz-sigma" min="1" max="30" step="0.1" value="10.0">

                <label for="lorenz-rho">Rho: <span id="lorenz-rho-val">28.0</span></label>
                <input type="range" id="lorenz-rho" min="1" max="50" step="0.1" value="28.0">

                <label for="lorenz-beta">Beta: <span id="lorenz-beta-val">2.67</span></label>
                <input type="range" id="lorenz-beta" min="0.1" max="10" step="0.01" value="2.67">
            </div>

            <div class="control-group attractor-shared-controls" style="display: none;">
                <label for="attractor-scale">Scale: <span id="attractor-scale-val">1.0</span></label>
                <input type="range" id="attractor-scale" min="0.01" max="10.0" step="0.01" value="1.0">
                
                <label for="particle-shape" style="margin-top: 10px;">Particle Shape:</label>
                <select id="particle-shape">
                    <option value="square">Square</option>
                    <option value="circle">Circle</option>
                    <option value="diamond">Diamond</option>
                </select>
            </div>

            <div class="control-group power-controls">
                <label for="power">Power: <span id="power-val">8</span></label>
                <input type="range" id="power" min="2" max="10" step="1" value="8">
            </div>

            <div class="control-group">
                <label for="rotation-speed">Rotation Speed: <span id="rotation-val">0.3</span></label>
                <input type="range" id="rotation-speed" min="0" max="2" step="0.1" value="0.3">
            </div>

            <div class="control-group">
                <button id="toggle-view">Switch to 2D View</button>
            </div>
            
            <div class="control-group" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                <button id="fullscreen-btn">Enter Fullscreen</button>
            </div>

            <button id="reset-params">Reset Parameters</button>
        </div>
        
        <button id="exit-fullscreen-btn" style="display: none;">Exit Fullscreen</button>
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="fractal-viewer.js"></script>
</body>
</html>
